services:
  # LogFlux Application (Frontend + Backend + Caddy)
  logflux:
    image: ${LOGFLUX_IMAGE:-logflux:local}
    container_name: logflux-app
    restart: unless-stopped
    ports:
      - "${LOGFLUX_HTTP_PORT:-80}:80"
    volumes:
      # Caddy 数据持久化
      - caddy_data:/data/caddy
      - caddy_config:/config/caddy
      - security_data:/config/security
      - caddy_logs:/var/log/caddy
      
      # 后端配置文件（只读）
      - ../backend/etc/config.yaml:/app/etc/config.yaml:ro
      
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    networks:
      - logflux-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    
    # 可选：资源限制
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 1G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 512M

networks:
  logflux-network:
    driver: bridge

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  security_data:
    driver: local
  caddy_logs:
    driver: local
